[build-system]
requires = ["uv_build>=0.11.28,<0.12"]
build-backend = "uv_build"

[project]
name = "hermes-agent-api-client"
version = "0.2.1"
description = "Typed async client for the Hermes Agent API Server"
readme = "README.md"
requires-python = ">=3.13"
license = "UPL-1.0"
license-files = ["LICENSE"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Framework :: AsyncIO",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Typing :: Typed",
]
dependencies = [
  "httpx>=0.28.1,<1",
  "pydantic>=2.13.4,<3",
]

[project.urls]
Repository = "https://github.com/Djelibeybi/hermes-agent-api-client"
Issues = "https://github.com/Djelibeybi/hermes-agent-api-client/issues"

[dependency-groups]
dev = [
  "basedpyright>=1.39.9",
  "prek==0.4.9",
  "pytest==9.1.1",
  "pytest-asyncio==1.4.0",
  "pytest-cov==7.1.0",
  "respx==0.23.1",
  "ruff==0.15.21",
]
release = [
  "python-semantic-release==10.6.1",
]

[tool.uv]
required-version = "==0.11.28"
default-groups = ["dev"]

[tool.uv.build-backend]
source-include = ["uv.lock"]

[tool.semantic_release]
allow_zero_version = true
assets = ["uv.lock"]
build_command = """
  uv lock --upgrade-package "$PACKAGE_NAME"
  uv build
  uv run --no-sync python scripts/verify_dist.py dist/*.whl dist/*.tar.gz
"""
commit_author = "GitHub Actions <github-actions@github.com>"
commit_message = "chore(release): {version}\n\n[skip ci]\n\nAutomatically generated by python-semantic-release\n\nSigned-off-by: GitHub Actions <github-actions@github.com>"
major_on_zero = false
version_toml = ["pyproject.toml:project.version"]

[tool.semantic_release.commit_parser_options]
ignore_merge_commits = true
minor_tags = ["feat"]
parse_squash_commits = true
patch_tags = ["fix", "perf"]

[tool.pytest.ini_options]
addopts = "-ra --strict-config --strict-markers --cov=hermes_agent_api_client --cov-report=term-missing"
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.coverage.run]
branch = true
source = ["hermes_agent_api_client"]

[tool.coverage.report]
fail_under = 100
show_missing = true
skip_covered = true

[tool.ruff]
line-length = 88
target-version = "py313"

[tool.ruff.lint]
select = ["ALL"]
ignore = ["COM812", "D203", "D213", "ISC001"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101", "SLF001"]
"tests/helpers/hermes.py" = [
  "ANN401",
  "B905",
  "EM101",
  "I001",
  "RUF007",
  "TC003",
  "TRY003",
]

[tool.basedpyright]
include = ["src", "tests"]
ignore = ["tests/helpers/hermes.py"]
pythonVersion = "3.13"
typeCheckingMode = "strict"
venv = ".venv"
venvPath = "."
