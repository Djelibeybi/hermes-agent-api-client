name: Release

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.repository == 'Djelibeybi/hermes-agent-api-client'
    runs-on: ubuntu-latest
    env:
      PACKAGE_NAME: hermes-agent-api-client
    concurrency:
      group: ${{ github.workflow }}-release-${{ github.ref_name }}
      cancel-in-progress: false
    outputs:
      released: ${{ steps.release.outputs.released }}
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      is_prerelease: ${{ steps.release.outputs.is_prerelease }}

    steps:
      - name: Create release App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.PSR_APP_CLIENT_ID }}
          private-key: ${{ secrets.PSR_APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Checkout release branch with App token
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Install uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Install locked release dependencies
        run: uv sync --locked --group release --no-default-groups

      - name: Configure release identity
        run: |
          git config --local user.email "github-actions@github.com"
          git config --local user.name "GitHub Actions"
          git config --local commit.gpgsign false
          git config --local tag.gpgsign false

      - name: Create GitHub release and assets
        id: release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set +e
          output="$(uv run --no-sync semantic-release version 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$output"
          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi
          if printf '%s\n' "$output" | grep -q "No release will be made"; then
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          version="$(uv run --no-sync python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          {
            echo "released=true"
            echo "version=$version"
            echo "tag=v$version"
            case "$version" in
              *-*) echo "is_prerelease=true" ;;
              *) echo "is_prerelease=false" ;;
            esac
          } >> "$GITHUB_OUTPUT"
          uv run --no-sync semantic-release publish

      - name: Upload distribution artifacts
        if: steps.release.outputs.released == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: distribution-artifacts
          path: dist
          if-no-files-found: error

  deploy:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/hermes-agent-api-client

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: distribution-artifacts
          path: dist

      - name: Verify downloaded distribution artifacts
        run: |
          test -n "$(find dist -type f -name '*.whl' -print -quit)"
          test -n "$(find dist -type f -name '*.tar.gz' -print -quit)"

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist
